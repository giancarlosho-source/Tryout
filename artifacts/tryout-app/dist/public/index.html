  <body>
    <div id="root">
      <div id="loading-msg" style="font-family:sans-serif;padding:2rem;color:#555">Loading…</div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<div style="background:#fee2e2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;font-family:sans-serif;text-align:center">'
          + '<div style="font-size:2rem;margin-bottom:1rem">⚠️</div>'
          + '<h1 style="color:#b91c1c;font-size:1.25rem;margin-bottom:0.5rem">JS Error before React</h1>'
          + '<pre style="background:#fecaca;color:#7f1d1d;border-radius:0.5rem;padding:1rem;max-width:90vw;overflow:auto;text-align:left;white-space:pre-wrap">'
          + (msg || '') + '\n\nSource: ' + (src || '') + ':' + line + ':' + col
          + '\n\n' + (err && err.stack ? err.stack : '')
          + '</pre></div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason instanceof Error ? e.reason.message : String(e.reason);
        // Ignore network-level failures — these are expected when the tunnel or API is unreachable
        var networkErrors = ['Load failed', 'Failed to fetch', 'NetworkError', 'Network request failed', 'cancelled'];
        if (networkErrors.some(function(s) { return msg.indexOf(s) !== -1; })) return;
        window.onerror('Unhandled Promise rejection: ' + e.reason, '', 0, 0, e.reason instanceof Error ? e.reason : null);
      });
    </script>
  </body>

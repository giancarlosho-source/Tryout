name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Reports pre-existing typecheck debt without blocking merges. Flip
  # continue-on-error to false once the backlog of implicit-any / stale
  # errors is cleared and this can gate merges for real.
  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  api-server-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tryoutdesk_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d tryoutdesk_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/tryoutdesk_test
      JWT_SECRET: ci-test-jwt-secret
      CRON_SECRET: ci-test-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node migrate.mjs
        working-directory: artifacts/api-server
      - run: npx vitest run
        working-directory: artifacts/api-server
